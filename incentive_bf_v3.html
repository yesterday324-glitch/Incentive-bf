let cC='동남아',cS='베트남';
const defS={'동남아':'베트남','일본':'일본(인천/청주)','중국':'중국(인천/청주)','괌':'호주/뉴질랜드','유럽':'미주','크루즈':'C일본','골프':'G태국','국내':'제주도','트래킹':'T일본','종교':'R일본'};
function gl(id){return lbs[id]||id;}
function rCats(){
  document.getElementById('ct').innerHTML=cats.map(c=>
    `<button class="cat-btn${c.id===cC?' active':''}" onclick="sC('${c.id}')">${c.lb}</button>`
  ).join('');
}
function rSubs(){
  const cat=cats.find(c=>c.id===cC);
  document.getElementById('sg').innerHTML=cat.subs.map(s=>{
    const r=D[s],col=r?r.c:'gray',act=s===cS?' active':'';
    return `<button class="sub-btn ${col}${act}" onclick="sS(this,'${s}')">${gl(s)}</button>`;
  }).join('');
}
function rDetail(){
  const p=document.getElementById('dp');
  if(!cS||!D[cS]){p.className='panel';p.innerHTML='';tick();return;}
  const r=D[cS],col=r.c;
  let h=`<div class="p-title ${col}">📋 ${gl(cS)} 인센티브 혜택</div>`;
  if(r.box){r.box.forEach(bx=>{
    const ch=bx.chips.map(c=>`<span class="pc">${c}</span>`).join('');
    const rw=bx.rows.map(x=>`<tr><td class="qt">${x[0]}</td><td class="amt">${x[1]}</td></tr>`).join('');
    const nt=bx.note?`<div class="promo-note">※ ${bx.note}</div>`:'';
    h+=`<div class="promo-box"><div class="promo-hd">${bx.t}<span class="sub">${bx.sub}</span></div><div class="promo-bd"><div class="promo-chips">${ch}</div><table class="promo-tb"><tbody>${rw}</tbody></table>${nt}</div></div>`;
  });}
  r.s.forEach(sec=>{
    h+=`<div class="s-hdr ${col}">${sec.t}</div><table><thead><tr><th style="width:104px">구분</th><th style="width:130px">인원</th><th>혜택 내용</th><th style="width:148px">조건</th></tr></thead><tbody>`;
    sec.r.forEach(row=>{
      if(row.subhdr){
        h+=`<tr><td colspan="4" class="sub-hdr-row">${row.subhdr}</td></tr>`;
      } else {
        h+=`<tr><td><span class="badge ${bcM[row.cs]||'b0'}">${row.cat}</span></td><td>${row.p}</td><td>${row.b}</td><td class="ctd">${row.d}</td></tr>`;
      }
    });
    h+=`</tbody></table>`;
    if(sec.box){sec.box.forEach(bx=>{
      const ch=bx.chips.map(c=>`<span class="pc">${c}</span>`).join('');
      const rw=bx.rows.map(x=>`<tr><td class="qt">${x[0]}</td><td class="amt">${x[1]}</td></tr>`).join('');
      const nt=bx.note?`<div class="promo-note">※ ${bx.note}</div>`:'';
      h+=`<div class="promo-box"><div class="promo-hd">${bx.t}<span class="sub">${bx.sub}</span></div><div class="promo-bd"><div class="promo-chips">${ch}</div><table class="promo-tb"><tbody>${rw}</tbody></table>${nt}</div></div>`;
    });}
  });
  p.className='panel show';p.innerHTML=h;tick();
}
function sC(id){
  cC=id;
  cS=defS[id]||null;rCats();rSubs();rDetail();
}
function sS(el,id){cS=cS===id?null:id;rSubs();rDetail();}
function tick(){setTimeout(()=>parent.postMessage({type:'wrks:viz:resize',height:document.documentElement.scrollHeight},'*'),80);}
rCats();rSubs();rDetail();
window.addEventListener('load',tick);
new ResizeObserver(tick).observe(document.body);
</script>
